<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主流大模型 API 官方价格看板</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            900: '#0F172A',
                            850: '#1E293B/70',
                            800: '#1E293B',
                            700: '#334155'
                        }
                    }
                }
            }
        };
        
        // 立即运行以防止主题闪烁
        (function() {
            const savedMode = localStorage.getItem('theme_mode');
            let isDark;
            if (savedMode) {
                isDark = savedMode === 'dark';
            } else {
                isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }
        /* 简约商务表格滚动条 */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 3px;
        }
        /* 暗黑科技感氛围光 */
        .dark .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.07) 0%, rgba(99, 102, 241, 0.04) 50%, rgba(0, 0, 0, 0) 100%);
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            pointer-events: none;
            filter: blur(80px);
        }
        /* 磨砂玻璃质感 */
        .glass-panel {
            backdrop-filter: blur(12px) saturate(180%);
            background-color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .dark .glass-panel {
            backdrop-filter: blur(12px) saturate(180%);
            background-color: rgba(15, 23, 42, 0.45);
            border: 1px solid rgba(30, 41, 59, 0.6);
        }
        /* 微动交互 */
        .hover-scale {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hover-scale:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.08), 0 8px 10px -6px rgba(59, 130, 246, 0.08);
        }
    </style>
</head>

            所有单价均为官方公开数据折算，实际计费还会受到网络税费、地区差价及提供商调价影响。

            },
            {

            },
            {

                name: 'Gemini 3.1 Flash-Lite',

                notes: '极低单价的超轻量多模态小模型，适合海量短信息预过滤。'
            },
            {

                type: 'image',

                outputUSD: 0.165,
                context: '自适应尺寸',
                notes: '2026年4月底最新发布。OpenAI 图像生成旗舰，支持低/中/高三档画质选择，单价为 $0.005 至 $0.165/张。'
            },
            {
                id: 'gpt-image-15',
                name: 'GPT-Image-1.5',
                provider: 'OpenAI',
                type: 'image',
                inputUSD: 0.009,
                cachedInputUSD: null,
                outputUSD: 0.20,
                context: '按张计费',
                notes: 'OpenAI 前代图像生成旗舰，支持低/高画质选择，单价为 $0.009 至 $0.20/张。'
            },
            {
                id: 'kimi-k26',
                name: 'Kimi K2.6',
                provider: 'Moonshot AI',
                type: 'text',
                inputUSD: 0.95,
                cachedInputUSD: 0.16,
                outputUSD: 4.00,
                context: '256K',
                notes: '国内优秀长上下文模型，多轮交互缓存命中率高，适合中文长文分析。'
            },
            {
                id: 'glm-51',
                name: 'GLM-5.1',
                provider: 'Z.AI (智谱)',
                type: 'text',
                inputUSD: 1.40,
                cachedInputUSD: 0.26,
                outputUSD: 4.40,
                context: '200K',
                notes: '国产高频生产级大模型，在工具链集成与自动化流程中调用顺畅。'
            }
        ];

        // 状态变量
        let currentCurrency = 'CNY';
        const exchangeRate = 7.25;
        let selectedProvider = 'ALL';
        let currentCategory = 'ALL';
        let searchQuery = '';

        // 动态提取当前类别下的唯一厂商
        function getProvidersForCurrentCategory() {
            const filteredModels = currentCategory === 'ALL' 
                ? apiModels 
                : apiModels.filter(m => m.type === currentCategory);
            return ['ALL', ...new Set(filteredModels.map(m => m.provider))];
        }

        // 深浅色模式切换
        function toggleThemeMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme_mode', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        // 更新深浅色图标
        function updateThemeIcon(isDark) {
            const darkIcon = document.getElementById('theme-icon-dark');
            const lightIcon = document.getElementById('theme-icon-light');
            if (isDark) {
                darkIcon.classList.remove('hidden');
                lightIcon.classList.add('hidden');
            } else {
                darkIcon.classList.add('hidden');
                lightIcon.classList.add('hidden'); // Fixed: hide both then toggle
                lightIcon.classList.remove('hidden');
            }
        }

        // 获取系统当前是否是深色模式
        function getSystemThemePreference() {
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        // 初始化
        function initApp() {
            const savedMode = localStorage.getItem('theme_mode');
            let isDark;
            if (savedMode) {
                isDark = savedMode === 'dark';
            } else {
                isDark = getSystemThemePreference();
            }
            
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateThemeIcon(isDark);

            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                    if (!localStorage.getItem('theme_mode')) {
                        const newIsDark = e.matches;
                        if (newIsDark) {
                            document.documentElement.classList.add('dark');
                        } else {
                            document.documentElement.classList.remove('dark');
                        }
                        updateThemeIcon(newIsDark);
                    }
                });
            }

            setCategory('ALL');
            setCurrency(currentCurrency);
        }

        // 渲染厂商过滤Tab
        function renderProviderTabs() {
            const container = document.getElementById('provider-tabs');
            const availableProviders = getProvidersForCurrentCategory();
            container.innerHTML = availableProviders.map(p => {
                const isActive = p === selectedProvider;
                const activeClass = isActive 
                    ? 'border-blue-600 text-blue-600 dark:border-blue-500 dark:text-blue-500 font-bold' 
                    : 'border-transparent text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white';
                return `
                    <button onclick="setProvider('${p}')" class="px-4 py-2 border-b-2 text-xs transition-all cursor-pointer ${activeClass}">
                        ${p === 'ALL' ? '全部厂商' : p}
                    </button>
                `;
            }).join('');
        }

        // 切换模型分类
        function setCategory(category) {
            currentCategory = category;
            
            const cats = ['ALL', 'text', 'image'];
            cats.forEach(c => {
                const btn = document.getElementById(`cat-${c}`);
                if (btn) {
                    if (c === category) {
                        btn.className = 'px-4 py-2 font-bold rounded-lg bg-blue-600 text-white shadow-sm transition-all cursor-pointer';
                    } else {
                        btn.className = 'px-4 py-2 font-semibold rounded-lg text-slate-500 hover:text-slate-850 dark:text-slate-400 dark:hover:text-white transition-all cursor-pointer';
                    }
                }
            });

            const availableProviders = getProvidersForCurrentCategory();
            if (!availableProviders.includes(selectedProvider)) {
                selectedProvider = 'ALL';
            }
            renderProviderTabs();
            renderData();
        }

        // 过滤厂商
        function setProvider(p) {
            selectedProvider = p;
            renderProviderTabs();
            renderData();
        }

        // 搜索处理
        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            renderData();
        }

        // 切换币种
        function setCurrency(currency) {
            currentCurrency = currency;
            
            document.getElementById('btn-cny').className = currency === 'CNY'
                ? 'px-3 py-1.5 text-[11px] font-bold rounded-md bg-blue-600 text-white shadow-md shadow-blue-900/10 dark:shadow-blue-900/30 transition-all cursor-pointer'
                : 'px-3 py-1.5 text-[11px] font-bold rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-all cursor-pointer';
            
            document.getElementById('btn-usd').className = currency === 'USD'
                ? 'px-3 py-1.5 text-[11px] font-bold rounded-md bg-blue-600 text-white shadow-md shadow-blue-900/10 dark:shadow-blue-900/30 transition-all cursor-pointer'
                : 'px-3 py-1.5 text-[11px] font-bold rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-all cursor-pointer';

            renderData();
        }

        // 价格自适应单元格渲染
        function renderPriceCell(valUSD, type, colType, model) {
            if (valUSD === null || valUSD === undefined) {
                if (type === 'image' && colType === 'output') {
                    return `<span class="text-slate-450 dark:text-slate-500 font-medium">按张计费</span>`;
                }
                return '<span class="text-slate-400 dark:text-slate-650">-</span>';
            }

            const val = currentCurrency === 'CNY' ? valUSD * exchangeRate : valUSD;
            const symbol = currentCurrency === 'CNY' ? '¥' : '$';
            
            let decimals = (val < 0.01) ? 4 : (val < 0.1) ? 3 : 2;
            let unit = (type === 'text') ? '<span class="text-[10px] text-slate-400 dark:text-slate-500 font-normal"> / 1M</span>' : '<span class="text-[10px] text-slate-400 dark:text-slate-500 font-normal"> / 张</span>';

            return `<span class="font-mono font-bold">${symbol}${val.toFixed(decimals)}</span>${unit}`;
        }

        // 核心渲染逻辑
        function renderData() {
            const filtered = apiModels.filter(m => {
                const categoryMatch = currentCategory === 'ALL' || m.type === currentCategory;
                const providerMatch = selectedProvider === 'ALL' || m.provider === selectedProvider;
                const searchMatch = m.name.toLowerCase().includes(searchQuery) || m.notes.toLowerCase().includes(searchQuery) || m.provider.toLowerCase().includes(searchQuery);
                return categoryMatch && providerMatch && searchMatch;
            });

            // 1. 桌面端表格渲染
            const tbody = document.getElementById('table-rows');
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="py-12 text-center text-slate-450 dark:text-slate-500">未找到相关大模型价格信息</td></tr>`;
            } else {
                tbody.innerHTML = filtered.map(m => {
                    return `
                    <tr class="hover:bg-slate-100/50 dark:hover:bg-slate-900/30 transition-colors">
                        <td class="py-4 px-6 text-slate-900 dark:text-white">
                            <span class="font-bold">${m.name}</span>
                        </td>
                        <td class="py-4 px-6">
                            <span class="rounded bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-2 py-0.5 text-[10px] text-slate-500 dark:text-slate-400 font-semibold">${m.provider}</span>
                        </td>
                        <td class="py-4 px-6 text-right text-slate-850 dark:text-slate-200">${renderPriceCell(m.inputUSD, m.type, 'input', m)}</td>
                        <td class="py-4 px-6 text-right text-amber-600 dark:text-amber-500/90">${renderPriceCell(m.cachedInputUSD, m.type, 'cached', m)}</td>
                        <td class="py-4 px-6 text-right text-emerald-600 dark:text-emerald-500/90">${renderPriceCell(m.outputUSD, m.type, 'output', m)}</td>
                        <td class="py-4 px-6 font-mono text-slate-550 dark:text-slate-400">${m.context}</td>
                        <td class="py-4 px-6 text-slate-500 dark:text-slate-400 max-w-xs whitespace-normal break-words hover:text-slate-850 dark:hover:text-white transition-colors duration-150 cursor-default" title="${m.notes}">${m.notes}</td>
                    </tr>
                    `;
                }).join('');
            }

            // 2. 移动端卡片渲染
            const cardList = document.getElementById('card-list');
            if (filtered.length === 0) {
                cardList.innerHTML = `<div class="py-8 text-center text-slate-500 text-xs">未找到相关大模型价格信息</div>`;
            } else {
                cardList.innerHTML = filtered.map(m => {
                    const inputPrice = renderPriceCell(m.inputUSD, m.type, 'input', m);
                    const cachedPrice = renderPriceCell(m.cachedInputUSD, m.type, 'cached', m);
                    const outputPrice = renderPriceCell(m.outputUSD, m.type, 'output', m);
                    
                    return `
                    <div class="rounded-xl glass-panel p-4 space-y-3 shadow-sm hover-scale">
                        <div class="flex items-center justify-between flex-wrap gap-2">
                            <h3 class="font-bold text-sm text-slate-900 dark:text-white">${m.name}</h3>
                            <span class="rounded bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-2 py-0.5 text-[9px] text-slate-500 dark:text-slate-400 font-semibold">${m.provider}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-center text-[10px] bg-slate-50/50 dark:bg-slate-950/40 p-2.5 rounded-lg border border-slate-200/50 dark:border-slate-850/50">
                            <div>
                                <span class="block text-slate-400 dark:text-slate-500">输入 / 生成</span>
                                <span class="font-bold text-slate-800 dark:text-slate-200 mt-1 block">${inputPrice}</span>
                            </div>
                            <div>
                                <span class="block text-amber-600 dark:text-amber-500/80">缓存 / 批量</span>
                                <span class="font-bold text-amber-600 dark:text-amber-450 mt-1 block">${cachedPrice}</span>
                            </div>
                            <div>
                                <span class="block text-emerald-600 dark:text-emerald-500/80">标准输出</span>
                                <span class="font-bold text-emerald-600 dark:text-emerald-450 mt-1 block">${outputPrice}</span>
                            </div>
                        </div>
                        <div class="text-[11px] text-slate-500 dark:text-slate-400 leading-relaxed pt-1">
                            备注: ${m.notes}
                        </div>
                        <div class="flex items-center justify-between text-[10px] text-slate-400 dark:text-slate-500 pt-2 border-t border-slate-100 dark:border-slate-800/60 font-mono">
                            <span>类型: ${m.type === 'text' ? '文本大模型' : '图像与多模态'}</span>
                            <span>窗口/尺寸: ${m.context}</span>
                        </div>
                    </div>
                    `;
                }).join('');
            }
        }

        // 加载运行
        window.addEventListener('DOMContentLoaded', () => {
            initApp();
        });
    </script>
</body>
</html>
