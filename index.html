<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主流大模型 API 官方价格看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            anthropic: '#D97757',
                            openai:    '#10A37F',
                            deepseek:  '#4F6BED',
                            google:    '#4285F4',
                            moonshot:  '#7C3AED',
                            zhipu:     '#0D9488',
                        }
                    }
                }
            }
        };
        (function() {
            const savedMode = localStorage.getItem('theme_mode');
            let isDark = savedMode ? savedMode === 'dark' : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.classList.toggle('dark', isDark);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        .price-num { font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
    </style>
</head>
<body class="min-h-screen bg-[#F1F5F9] dark:bg-[#020617] text-slate-800 dark:text-slate-100 antialiased transition-colors duration-300">
    <!-- 顶部导航 -->
    <header class="sticky top-0 z-50 backdrop-blur-md bg-white/80 dark:bg-slate-950/80 border-b border-slate-200/60 dark:border-slate-800/60">
        <div class="mx-auto max-w-7xl px-4 md:px-8 py-3 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </div>
                <div class="min-w-0">
                    <h1 class="text-sm md:text-base font-bold tracking-tight text-slate-900 dark:text-white truncate">API 价格看板</h1>
                    <p class="text-[10px] text-slate-400 dark:text-slate-500 hidden sm:block">主流大模型官方定价 · 实时汇率</p>
                </div>
            </div>

            <div class="flex items-center gap-2 shrink-0">
                <div id="rate-badge" class="flex items-center gap-1.5 rounded-lg bg-slate-100 dark:bg-slate-900 px-2.5 py-1.5 text-[11px]">
                    <span class="text-slate-400 dark:text-slate-500">USD/CNY</span>
                    <span id="rate-value" class="font-mono font-bold text-slate-800 dark:text-slate-200 text-xs">—</span>
                    <span id="rate-dot" class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
                </div>
                <div class="flex overflow-hidden rounded-lg bg-slate-100 dark:bg-slate-900 p-0.5">
                    <button id="btn-cny" onclick="setCurrency('CNY')" class="px-3 py-1.5 text-[11px] font-bold rounded-md transition-all cursor-pointer">¥ CNY</button>
                    <button id="btn-usd" onclick="setCurrency('USD')" class="px-3 py-1.5 text-[11px] font-bold rounded-md transition-all cursor-pointer">$ USD</button>
                </div>
                <button onclick="toggleThemeMode()" class="rounded-lg bg-slate-100 dark:bg-slate-900 p-2 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all cursor-pointer" title="切换深浅色">
                    <svg id="theme-icon-dark" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <svg id="theme-icon-light" class="w-3.5 h-3.5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14.25 12a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 md:px-8 py-5">
        <!-- 工具栏 -->
        <div class="mb-5 flex flex-col sm:flex-row items-start sm:items-center gap-3">
            <div class="flex flex-wrap gap-1.5">
                <button id="cat-ALL" onclick="setCategory('ALL')" class="px-3.5 py-1.5 rounded-lg text-[12px] font-semibold transition-all cursor-pointer">全部</button>
                <button id="cat-text" onclick="setCategory('text')" class="px-3.5 py-1.5 rounded-lg text-[12px] font-medium transition-all cursor-pointer">💬 文本</button>
                <button id="cat-image" onclick="setCategory('image')" class="px-3.5 py-1.5 rounded-lg text-[12px] font-medium transition-all cursor-pointer">🎨 图像</button>
            </div>
            <div class="flex flex-wrap gap-1.5" id="provider-tabs"></div>
            <div class="flex items-center gap-2 ml-auto">
                <select id="sort-select" onchange="setSort(this.value)" class="rounded-lg border border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-900 text-slate-600 dark:text-slate-300 text-[11px] px-2.5 py-1.5 outline-none focus:border-blue-500 transition-all cursor-pointer">
                    <option value="default">默认</option>
                    <option value="input-asc">输入 ↑</option>
                    <option value="input-desc">输入 ↓</option>
                    <option value="output-asc">输出 ↑</option>
                    <option value="output-desc">输出 ↓</option>
                </select>
                <input id="search-input" type="text" oninput="handleSearch()" placeholder="搜索…" class="w-28 rounded-lg border border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-blue-500 transition-all text-[11px] px-2.5 py-1.5">
            </div>
        </div>

        <!-- 卡片网格 -->
        <div id="card-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"></div>

        <div id="empty-state" class="hidden py-16 text-center text-slate-400 text-sm">未找到匹配的模型</div>

        <footer class="mt-8 pt-4 border-t border-slate-200/60 dark:border-slate-800/60 text-center text-[10px] text-slate-400 dark:text-slate-500">
            所有数据来自各厂商官方定价页。标 <span class="text-amber-600 font-bold">¥</span> 的模型以人民币为基准，汇率变动仅影响美元显示。
        </footer>
    </main>

    <script>
        // ── 数据：按厂商分层，baseCurrency 标记官方定价币种 ──
        const apiModels = [
            // Anthropic
            { id:'claude-opus-48', name:'Opus 4.8', provider:'Anthropic', type:'text', tier:'旗舰',
              baseCurrency:'USD', input:5.00, cachedInput:0.50, output:25.00, context:'1M',
              notes:'最新旗舰。复杂推理与长程编码最强。', color:'brand-anthropic' },
            { id:'claude-opus-48-fast', name:'Opus 4.8 Fast', provider:'Anthropic', type:'text', tier:'极速',
              baseCurrency:'USD', input:10.00, cachedInput:1.00, output:50.00, context:'1M',
              notes:'高速模式，低时延复杂生产级应用。', color:'brand-anthropic' },
            { id:'claude-sonnet-46', name:'Sonnet 4.6', provider:'Anthropic', type:'text', tier:'中坚',
              baseCurrency:'USD', input:3.00, cachedInput:0.30, output:15.00, context:'1M',
              notes:'速度与智能最优平衡，编码黄金准线。', color:'brand-anthropic' },
            { id:'claude-haiku-45', name:'Haiku 4.5', provider:'Anthropic', type:'text', tier:'轻量',
              baseCurrency:'USD', input:1.00, cachedInput:0.10, output:5.00, context:'200K',
              notes:'极致速度，近前沿智能，高吞吐首选。', color:'brand-anthropic' },
            // OpenAI
            { id:'gpt-55', name:'GPT-5.5', provider:'OpenAI', type:'text', tier:'旗舰',
              baseCurrency:'USD', input:5.00, cachedInput:0.50, output:30.00, context:'1.05M',
              notes:'顶阶旗舰多模态推理，>272K 加价。', color:'brand-openai' },
            { id:'gpt-54', name:'GPT-5.4', provider:'OpenAI', type:'text', tier:'中坚',
              baseCurrency:'USD', input:2.50, cachedInput:0.25, output:15.00, context:'270K',
              notes:'中大型推理通用模型，性价比突出。', color:'brand-openai' },
            { id:'gpt-54-mini', name:'GPT-5.4 mini', provider:'OpenAI', type:'text', tier:'轻量',
              baseCurrency:'USD', input:0.75, cachedInput:0.075, output:4.50, context:'128K',
              notes:'轻量主力，信息提炼效率优秀。', color:'brand-openai' },
            { id:'gpt-54-nano', name:'GPT-5.4 nano', provider:'OpenAI', type:'text', tier:'超轻',
              baseCurrency:'USD', input:0.20, cachedInput:0.02, output:1.25, context:'128K',
              notes:'极致低价，分类/标签/批量预处理。', color:'brand-openai' },
            { id:'gpt-image-2', name:'GPT-Image-2', provider:'OpenAI', type:'image', tier:'旗舰',
              baseCurrency:'USD', input:5.00, cachedInput:1.25, output:30.00, context:'≤3840px',
              notes:'文本提示 $5/1M；图像输出 $30/1M token。1024²：低$0.006·中$0.053·高$0.211/张。', color:'brand-openai' },
            // DeepSeek (CNY)
            { id:'deepseek-v4-pro', name:'DeepSeek V4 Pro', provider:'DeepSeek', type:'text', tier:'旗舰',
              baseCurrency:'CNY', input:3.00, cachedInput:0.025, output:6.00, context:'1M',
              notes:'¥3/百万 token（含限时75%折扣）。旗舰推理，极致性价比。', color:'brand-deepseek' },
            { id:'deepseek-v4-flash', name:'DeepSeek V4 Flash', provider:'DeepSeek', type:'text', tier:'轻量',
              baseCurrency:'CNY', input:1.00, cachedInput:0.02, output:2.00, context:'1M',
              notes:'¥1/百万 token。缓存命中仅 ¥0.02，日常开发首选。', color:'brand-deepseek' },
            // Google
            { id:'gemini-35-flash', name:'Gemini 3.5 Flash', provider:'Google', type:'text', tier:'中坚',
              baseCurrency:'USD', input:1.50, cachedInput:0.15, output:9.00, context:'1M',
              notes:'最新多模态效率旗舰，首 Token 延迟极低。', color:'brand-google' },
            { id:'gemini-31-pro-preview', name:'Gemini 3.1 Pro', provider:'Google', type:'text', tier:'旗舰',
              baseCurrency:'USD', input:2.00, cachedInput:0.20, output:12.00, context:'200K (>200K加价)',
              notes:'Pro 预览版，大体积音视频及图像综合分析。', color:'brand-google' },
            // Kimi (CNY)
            { id:'kimi-k26', name:'Kimi K2.6', provider:'Moonshot', type:'text', tier:'旗舰',
              baseCurrency:'CNY', input:6.50, cachedInput:1.10, output:27.00, context:'256K',
              notes:'最新最智能，长程代码编写能力突出。¥6.50/百万 token。', color:'brand-moonshot' },
            // 智谱 (CNY)
            { id:'glm-51', name:'GLM-5.1', provider:'智谱 AI', type:'text', tier:'旗舰',
              baseCurrency:'CNY', input:10.00, cachedInput:2.00, output:30.00, context:'200K',
              notes:'⚠ 价格待核实。国产高频生产级模型。', color:'brand-zhipu' },
        ];

        let currentCurrency = 'CNY';
        let exchangeRate = 7.25;
        let exchangeRateLive = false;
        let selectedProvider = 'ALL';
        let currentCategory = 'ALL';
        let searchQuery = '';
        let currentSort = 'default';

        // ── 汇率 ──
        async function fetchExchangeRate() {
            try {
                const rsp = await fetch('https://open.er-api.com/v6/latest/USD');
                const d = await rsp.json();
                if (d?.rates?.CNY) { exchangeRate = d.rates.CNY; exchangeRateLive = true; }
            } catch (_) {}
            document.getElementById('rate-value').textContent = exchangeRate.toFixed(4);
            document.getElementById('rate-dot').className = 'w-1.5 h-1.5 rounded-full ' + (exchangeRateLive ? 'bg-emerald-500' : 'bg-amber-500');
            renderData();
        }

        // ── 币种转换 ──
        function toDisplay(model, field) {
            const base = model[field];
            if (base === null || base === undefined) return null;
            if (model.baseCurrency === currentCurrency) return base;
            if (model.baseCurrency === 'CNY' && currentCurrency === 'USD') return base / exchangeRate;
            if (model.baseCurrency === 'USD' && currentCurrency === 'CNY') return base * exchangeRate;
            return base;
        }

        function fmt(val) {
            if (val === null || val === undefined) return null;
            const s = currentCurrency === 'CNY' ? '¥' : '$';
            let d = val < 0.01 ? 4 : val < 0.1 ? 3 : 2;
            return s + val.toFixed(d);
        }

        // ── 主题 ──
        function toggleThemeMode() {
            const d = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme_mode', d ? 'dark' : 'light');
            document.getElementById('theme-icon-dark').classList.toggle('hidden', !d);
            document.getElementById('theme-icon-light').classList.toggle('hidden', d);
        }
        function syncThemeIcon(d) {
            document.getElementById('theme-icon-dark').classList.toggle('hidden', !d);
            document.getElementById('theme-icon-light').classList.toggle('hidden', d);
        }

        // ── 初始化 ──
        function initApp() {
            const saved = localStorage.getItem('theme_mode');
            let isDark = saved ? saved === 'dark' : (window.matchMedia?.matches ?? false);
            document.documentElement.classList.toggle('dark', isDark);
            syncThemeIcon(isDark);
            window.matchMedia?.('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (!localStorage.getItem('theme_mode')) {
                    document.documentElement.classList.toggle('dark', e.matches);
                    syncThemeIcon(e.matches);
                }
            });
            setCategory('ALL');
            setCurrency(currentCurrency);
            fetchExchangeRate();
        }

        // ── 筛选 & 排序 ──
        function getProviders() {
            const f = currentCategory === 'ALL' ? apiModels : apiModels.filter(m => m.type === currentCategory);
            return ['ALL', ...new Set(f.map(m => m.provider))];
        }
        function renderProviderTabs() {
            document.getElementById('provider-tabs').innerHTML = getProviders().map(p => {
                const a = p === selectedProvider;
                const cls = a ? 'bg-slate-200 dark:bg-slate-700 text-slate-900 dark:text-white font-bold' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700';
                return `<button onclick="setProvider('${p}')" class="px-3 py-1.5 rounded-lg text-[11px] transition-all cursor-pointer ${cls}">${p === 'ALL' ? '全部厂商' : p}</button>`;
            }).join('');
        }
        function setCategory(c) {
            currentCategory = c;
            ['ALL','text','image'].forEach(k => {
                const b = document.getElementById(`cat-${k}`);
                if (!b) return;
                b.className = k === c
                    ? 'px-3.5 py-1.5 rounded-lg text-[12px] font-bold bg-slate-800 dark:bg-white text-white dark:text-slate-900 transition-all cursor-pointer'
                    : 'px-3.5 py-1.5 rounded-lg text-[12px] font-medium bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all cursor-pointer';
            });
            if (!getProviders().includes(selectedProvider)) selectedProvider = 'ALL';
            renderProviderTabs();
            renderData();
        }
        function setProvider(p) { selectedProvider = p; renderProviderTabs(); renderData(); }
        function handleSearch() { searchQuery = document.getElementById('search-input').value.trim().toLowerCase(); renderData(); }
        function setSort(v) { currentSort = v; renderData(); }

        function setCurrency(cur) {
            currentCurrency = cur;
            document.getElementById('btn-cny').className = cur === 'CNY'
                ? 'px-3 py-1.5 text-[11px] font-bold rounded-md bg-slate-800 dark:bg-white text-white dark:text-slate-900 transition-all cursor-pointer'
                : 'px-3 py-1.5 text-[11px] font-bold rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-all cursor-pointer';
            document.getElementById('btn-usd').className = cur === 'USD'
                ? 'px-3 py-1.5 text-[11px] font-bold rounded-md bg-slate-800 dark:bg-white text-white dark:text-slate-900 transition-all cursor-pointer'
                : 'px-3 py-1.5 text-[11px] font-bold rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-all cursor-pointer';
            renderData();
        }

        // ── 渲染卡片 ──
        function renderData() {
            let filtered = apiModels.filter(m => {
                if (currentCategory !== 'ALL' && m.type !== currentCategory) return false;
                if (selectedProvider !== 'ALL' && m.provider !== selectedProvider) return false;
                if (searchQuery && !m.name.toLowerCase().includes(searchQuery) && !m.notes.toLowerCase().includes(searchQuery) && !m.provider.toLowerCase().includes(searchQuery)) return false;
                return true;
            });

            const getIn = m => toDisplay(m,'input') ?? Infinity;
            const getOut = m => toDisplay(m,'output') ?? Infinity;
            if (currentSort === 'input-asc')  filtered.sort((a,b) => getIn(a) - getIn(b));
            if (currentSort === 'input-desc') filtered.sort((a,b) => getIn(b) - getIn(a));
            if (currentSort === 'output-asc')  filtered.sort((a,b) => getOut(a) - getOut(b));
            if (currentSort === 'output-desc') filtered.sort((a,b) => getOut(b) - getOut(a));

            const grid = document.getElementById('card-grid');
            const empty = document.getElementById('empty-state');

            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            grid.innerHTML = filtered.map(m => {
                const i = toDisplay(m, 'input');
                const c = toDisplay(m, 'cachedInput');
                const o = toDisplay(m, 'output');
                const isCNY = m.baseCurrency === 'CNY';
                const tierColors = {
                    '旗舰': 'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300',
                    '极速': 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300',
                    '中坚': 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
                    '轻量': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300',
                    '超轻': 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400',
                };

                return `
                <div class="group rounded-2xl bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800/80 overflow-hidden hover:shadow-lg hover:border-slate-300 dark:hover:border-slate-700 transition-all duration-200 flex flex-col">
                    <!-- 顶部色条 + 厂商 -->
                    <div class="h-1.5 w-full bg-${m.color}"></div>
                    <div class="p-4 flex flex-col gap-3 flex-1">
                        <!-- 厂家 & 标签行 -->
                        <div class="flex items-center justify-between gap-2">
                            <div class="flex items-center gap-2 min-w-0">
                                <span class="w-6 h-6 rounded-md bg-${m.color} flex items-center justify-center shrink-0">
                                    <span class="text-[10px] font-black text-white">${m.provider.slice(0,1)}</span>
                                </span>
                                <span class="text-[11px] font-semibold text-slate-500 dark:text-slate-400 truncate">${m.provider}</span>
                            </div>
                            <div class="flex items-center gap-1 shrink-0">
                                ${isCNY ? '<span class="text-[9px] text-amber-600 font-bold bg-amber-50 dark:bg-amber-900/30 px-1.5 py-0.5 rounded">¥ 基准</span>' : ''}
                                <span class="text-[9px] font-semibold px-1.5 py-0.5 rounded ${tierColors[m.tier] || tierColors['中坚']}">${m.tier}</span>
                            </div>
                        </div>

                        <!-- 模型名 -->
                        <h3 class="text-sm font-bold text-slate-900 dark:text-white leading-tight">${m.name}</h3>

                        <!-- 价格三列 -->
                        <div class="grid grid-cols-3 gap-2 bg-slate-50 dark:bg-slate-950 rounded-xl p-3 border border-slate-100 dark:border-slate-800/60">
                            <div class="text-center">
                                <span class="block text-[9px] text-slate-400 dark:text-slate-500 mb-1 uppercase tracking-wide">输入</span>
                                <span class="block text-sm font-extrabold price-num text-slate-800 dark:text-slate-200">${i !== null ? fmt(i) : '—'}</span>
                                <span class="block text-[8px] text-slate-400 dark:text-slate-500 mt-0.5">/1M token</span>
                            </div>
                            <div class="text-center border-x border-slate-100 dark:border-slate-800/40">
                                <span class="block text-[9px] text-amber-600 dark:text-amber-500 mb-1 uppercase tracking-wide">缓存</span>
                                <span class="block text-sm font-extrabold price-num text-amber-600 dark:text-amber-400">${c !== null ? fmt(c) : '—'}</span>
                                <span class="block text-[8px] text-amber-400 dark:text-amber-600 mt-0.5">/1M token</span>
                            </div>
                            <div class="text-center">
                                <span class="block text-[9px] text-emerald-600 dark:text-emerald-500 mb-1 uppercase tracking-wide">输出</span>
                                <span class="block text-sm font-extrabold price-num text-emerald-600 dark:text-emerald-400">${o !== null ? fmt(o) : '—'}</span>
                                <span class="block text-[8px] text-emerald-400 dark:text-emerald-600 mt-0.5">/1M token</span>
                            </div>
                        </div>

                        <!-- 备注 & 上下文 -->
                        <div class="flex items-start justify-between gap-2 mt-auto pt-2 border-t border-slate-100 dark:border-slate-800/40">
                            <span class="text-[10px] text-slate-400 dark:text-slate-500 leading-relaxed flex-1 line-clamp-2">${m.notes}</span>
                            <span class="text-[10px] font-mono text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded shrink-0">${m.context}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
