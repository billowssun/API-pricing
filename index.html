<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主流大模型 API 官方价格看板</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            900: '#0F172A',
                            850: '#1E293B/70',
                            800: '#1E293B',
                            700: '#334155'
                        }
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }
        /* 简约商务表格滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #1E293B;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 2px;
        }
    </style>
</head>
<body class="min-h-screen bg-[#F8FAFC] text-slate-800 dark:bg-[#0B0F19] dark:text-slate-100 antialiased py-10 px-4 md:px-8 transition-colors duration-200">

    <div class="mx-auto max-w-6xl">
        <!-- 商务极简头部 -->
        <header class="mb-10 flex flex-col md:flex-row md:items-end md:justify-between border-b border-slate-200 dark:border-slate-800/80 pb-6 gap-6">
            <div class="space-y-1.5">
                <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white flex items-center gap-2">
                    <span class="h-5 w-1 rounded-full bg-blue-600 dark:bg-blue-500"></span>
                    主流大模型 API 官方价格看板
                </h1>
                <p class="text-xs text-slate-500 dark:text-slate-400">
                    单纯列举最新主流商业及开源大模型官方 API 价格，排除干扰，一键切换汇率与深浅色模式。
                </p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 shrink-0 text-xs">
                <!-- 深浅色切换按钮 -->
                <button id="theme-toggle" onclick="toggleThemeMode()" class="rounded-full border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900/50 p-2 text-slate-650 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all cursor-pointer outline-none shadow-sm" title="切换深色/浅色模式">
                    <!-- 月亮图标 (深色) -->
                    <svg id="theme-icon-dark" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                    <!-- 太阳图标 (浅色) -->
                    <svg id="theme-icon-light" class="h-4 w-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14.25 12a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />
                    </svg>
                </button>

                <div class="rounded-full border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900/50 px-3 py-1.5 text-slate-500 dark:text-slate-400 shadow-sm">
                    汇率假设: <span class="font-mono font-bold text-slate-850 dark:text-slate-200">1 USD = 7.25 CNY</span>
                </div>
                <div class="rounded-full border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900/50 px-3 py-1.5 text-slate-500 dark:text-slate-400 shadow-sm">
                    数据更新时间: <span class="font-mono font-bold text-slate-850 dark:text-slate-200">2026-05-26</span>
                </div>
            </div>
        </header>

        <!-- 工具栏：过滤、搜索与币种切换 -->
        <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <!-- 厂商过滤 Tab -->
            <div id="provider-tabs" class="flex flex-wrap gap-1 border-b border-slate-200 dark:border-slate-800/40 pb-2 sm:pb-0 sm:border-0">
                <!-- 动态渲染 -->
            </div>

            <!-- 搜索与币种切换 -->
            <div class="flex items-center gap-3 w-full sm:w-auto shrink-0">
                <input id="search-input" type="text" oninput="handleSearch()" placeholder="搜索模型名称..." class="w-full sm:w-60 rounded-lg border border-slate-200 bg-white text-slate-800 dark:border-slate-800 dark:bg-slate-900/40 dark:text-slate-200 outline-none placeholder:text-slate-400 dark:placeholder:text-slate-650 focus:border-blue-500 dark:focus:border-blue-500 shadow-sm transition-all text-xs px-3 py-2">
                
                <div class="flex overflow-hidden rounded-lg border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-950 p-0.5 shrink-0 shadow-sm">
                    <button id="btn-cny" onclick="setCurrency('CNY')" class="px-3 py-1.5 text-[11px] font-bold rounded-md transition-all">CNY (¥)</button>
                    <button id="btn-usd" onclick="setCurrency('USD')" class="px-3 py-1.5 text-[11px] font-bold rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all">USD ($)</button>
                </div>
            </div>
        </div>

        <!-- 主价格表格 (桌面端) -->
        <div class="hidden md:block overflow-hidden rounded-xl border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900/20 shadow-sm dark:shadow-xl dark:shadow-black/10">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-slate-200 dark:border-slate-850 bg-slate-50 dark:bg-slate-900/30 text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider">
                        <th class="py-4 px-6 font-bold">模型名称</th>
                        <th class="py-4 px-6 font-bold">厂商</th>
                        <th class="py-4 px-6 text-right font-bold">标准输入单价 / 1M</th>
                        <th class="py-4 px-6 text-right font-bold text-amber-600 dark:text-amber-500/80">缓存输入单价 / 1M</th>
                        <th class="py-4 px-6 text-right font-bold text-emerald-600 dark:text-emerald-500/80">标准输出单价 / 1M</th>
                        <th class="py-4 px-6 font-bold">上下文窗口</th>
                        <th class="py-4 px-6 font-bold">特点与备注</th>
                    </tr>
                </thead>
                <tbody id="table-rows" class="divide-y divide-slate-150 dark:divide-slate-800/40 text-xs text-slate-700 dark:text-slate-300">
                    <!-- 动态渲染 -->
                </tbody>
            </table>
        </div>

        <!-- 极简卡片列表 (移动端) -->
        <div id="card-list" class="block md:hidden space-y-4">
            <!-- 动态渲染 -->
        </div>

        <!-- 极简页脚 -->
        <footer class="mt-12 border-t border-slate-200 dark:border-slate-900 py-6 text-center text-[10px] text-slate-400 dark:text-slate-500">
            所有单价均为官方公开数据折算，实际计费还会受到网络税费、地区差价及提供商调价影响。
        </footer>
    </div>

    <!-- 数据源与精简业务逻辑 -->
    <script>
        const apiModels = [
            {
                id: 'deepseek-v4-pro',
                name: 'DeepSeek V4 Pro',
                provider: 'DeepSeek',
                inputUSD: 0.435,
                cachedInputUSD: 0.003625,
                outputUSD: 0.87,
                context: '1M (1,000K)',
                notes: '包含官方限时折扣 75% off 口径，旗舰级推理，极具性价比。'
            },
            {
                id: 'deepseek-v4-flash',
                name: 'DeepSeek V4 Flash',
                provider: 'DeepSeek',
                inputUSD: 0.14,
                cachedInputUSD: 0.0028,
                outputUSD: 0.28,
                context: '1M (1,000K)',
                notes: '超高吞吐模型，缓存命中价格仅官网常规价格的 2%，日常开发首选。'
            },
            {
                id: 'claude-sonnet-46',
                name: 'Claude Sonnet 4.6',
                provider: 'Anthropic',
                inputUSD: 3.00,
                cachedInputUSD: 0.30,
                outputUSD: 15.00,
                context: '1M (1,000K)',
                notes: '全球编码与复杂逻辑推理的黄金准线模型。'
            },
            {
                id: 'claude-opus-47',
                name: 'Claude Opus 4.7',
                provider: 'Anthropic',
                inputUSD: 5.00,
                cachedInputUSD: 0.50,
                outputUSD: 25.00,
                context: '1M (1,000K)',
                notes: '智能脑力峰值模型，处理极端严苛学术与架构设计。'
            },
            {
                id: 'gpt-55',
                name: 'GPT-5.5 (OpenAI Flagship)',
                provider: 'OpenAI',
                inputUSD: 5.00,
                cachedInputUSD: 0.50,
                outputUSD: 30.00,
                context: '1.05M (>272K加价)',
                notes: 'OpenAI 顶阶旗舰，多模态推理先驱，大上下文下会自动触发加价。'
            },
            {
                id: 'gpt-54',
                name: 'GPT-5.4',
                provider: 'OpenAI',
                inputUSD: 2.50,
                cachedInputUSD: 0.25,
                outputUSD: 15.00,
                context: '<270K 优惠价格',
                notes: '经济型中大型推理通用模型，性价比较高。'
            },
            {
                id: 'gpt-54-mini',
                name: 'GPT-5.4 mini',
                provider: 'OpenAI',
                inputUSD: 0.75,
                cachedInputUSD: 0.075,
                outputUSD: 4.50,
                context: '128K',
                notes: '轻量主力高频处理模型，具有优秀的信息提炼效率。'
            },
            {
                id: 'gemini-35-flash',
                name: 'Gemini 3.5 Flash',
                provider: 'Google',
                inputUSD: 1.50,
                cachedInputUSD: 0.15,
                outputUSD: 9.00,
                context: '1M',
                notes: '多模态效率旗舰，首 Token 延迟极低，执行速度极快。'
            },
            {
                id: 'gemini-31-pro-preview',
                name: 'Gemini 3.1 Pro Preview',
                provider: 'Google',
                inputUSD: 2.00,
                cachedInputUSD: 0.20,
                outputUSD: 12.00,
                context: '200K (超量加价)',
                notes: '预览版高级多模态模型，支持大体积音视频及图像综合分析。'
            },
            {
                id: 'gemini-31-flash-lite',
                name: 'Gemini 3.1 Flash-Lite',
                provider: 'Google',
                inputUSD: 0.25,
                cachedInputUSD: 0.025,
                outputUSD: 1.50,
                context: '1M',
                notes: '极低单价的超轻量多模态小模型，适合海量短信息预过滤。'
            },
            {
                id: 'kimi-k26',
                name: 'Kimi K2.6',
                provider: 'Moonshot AI',
                inputUSD: 0.95,
                cachedInputUSD: 0.16,
                outputUSD: 4.00,
                context: '256K',
                notes: '国内优秀长上下文模型，多轮交互缓存命中率高，适合中文长文分析。'
            },
            {
                id: 'glm-51',
                name: 'GLM-5.1',
                provider: 'Z.AI (智谱)',
                inputUSD: 1.40,
                cachedInputUSD: 0.26,
                outputUSD: 4.40,
                context: '200K',
                notes: '国产高频生产级大模型，在工具链集成与自动化流程中调用顺畅。'
            }
        ];

        // 状态变量
        let currentCurrency = 'CNY';
        const exchangeRate = 7.25;
        let selectedProvider = 'ALL';
        let searchQuery = '';

        // 提取所有唯一厂商用于生成分类Tab
        const providers = ['ALL', ...new Set(apiModels.map(m => m.provider))];

        // 深浅色模式切换
        function toggleThemeMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme_mode', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        // 更新深浅色图标
        function updateThemeIcon(isDark) {
            const darkIcon = document.getElementById('theme-icon-dark');
            const lightIcon = document.getElementById('theme-icon-light');
            if (isDark) {
                darkIcon.classList.remove('hidden');
                lightIcon.classList.add('hidden');
            } else {
                darkIcon.classList.add('hidden');
                lightIcon.classList.remove('hidden');
            }
        }

        // 初始化
        function initApp() {
            // 加载本地深浅色设置
            const savedMode = localStorage.getItem('theme_mode');
            const isDark = savedMode !== 'light';
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateThemeIcon(isDark);

            renderProviderTabs();
            setCurrency(currentCurrency); // 自动应用币种高亮
        }

        // 渲染厂商过滤Tab
        function renderProviderTabs() {
            const container = document.getElementById('provider-tabs');
            container.innerHTML = providers.map(p => {
                const isActive = p === selectedProvider;
                const activeClass = isActive 
                    ? 'border-blue-600 text-blue-600 dark:border-blue-500 dark:text-blue-500 font-bold' 
                    : 'border-transparent text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white';
                return `
                    <button onclick="setProvider('${p}')" class="px-4 py-2 border-b-2 text-xs transition-all ${activeClass}">
                        ${p === 'ALL' ? '全部厂商' : p}
                    </button>
                `;
            }).join('');
        }

        // 过滤厂商
        function setProvider(p) {
            selectedProvider = p;
            renderProviderTabs();
            renderData();
        }

        // 搜索处理
        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            renderData();
        }

        // 切换币种
        function setCurrency(currency) {
            currentCurrency = currency;
            
            // 切换按钮高亮 (经典蓝商务风)
            document.getElementById('btn-cny').className = currency === 'CNY'
                ? 'px-3 py-1.5 text-[11px] font-bold rounded-md bg-blue-600 text-white shadow-md shadow-blue-900/10 dark:shadow-blue-900/30 transition-all'
                : 'px-3 py-1.5 text-[11px] font-bold rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-all';
            
            document.getElementById('btn-usd').className = currency === 'USD'
                ? 'px-3 py-1.5 text-[11px] font-bold rounded-md bg-blue-600 text-white shadow-md shadow-blue-900/10 dark:shadow-blue-900/30 transition-all'
                : 'px-3 py-1.5 text-[11px] font-bold rounded-md text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-all';

            renderData();
        }

        // 价格格式化
        function formatPrice(valUSD, decimals = 2) {
            const val = currentCurrency === 'CNY' ? valUSD * exchangeRate : valUSD;
            const symbol = currentCurrency === 'CNY' ? '¥' : '$';
            return `${symbol}${val.toFixed(decimals)}`;
        }

        // 核心渲染逻辑
        function renderData() {
            // 过滤数据
            const filtered = apiModels.filter(m => {
                const providerMatch = selectedProvider === 'ALL' || m.provider === selectedProvider;
                const searchMatch = m.name.toLowerCase().includes(searchQuery) || m.notes.toLowerCase().includes(searchQuery);
                return providerMatch && searchMatch;
            });

            // 1. 桌面端表格渲染
            const tbody = document.getElementById('table-rows');
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="py-12 text-center text-slate-450 dark:text-slate-500">未找到相关大模型价格信息</td></tr>`;
            } else {
                tbody.innerHTML = filtered.map(m => `
                    <tr class="hover:bg-slate-100/50 dark:hover:bg-slate-900/40 transition-colors">
                        <td class="py-4 px-6 font-bold text-slate-900 dark:text-white">${m.name}</td>
                        <td class="py-4 px-6"><span class="rounded bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-850 px-2 py-0.5 text-[10px] text-slate-500 dark:text-slate-400 font-semibold">${m.provider}</span></td>
                        <td class="py-4 px-6 text-right font-mono text-slate-800 dark:text-slate-200 font-semibold">${formatPrice(m.inputUSD, 3)}</td>
                        <td class="py-4 px-6 text-right font-mono text-amber-600 dark:text-amber-500/90 font-semibold">${formatPrice(m.cachedInputUSD, 4)}</td>
                        <td class="py-4 px-6 text-right font-mono text-emerald-600 dark:text-emerald-500/90 font-semibold">${formatPrice(m.outputUSD, 3)}</td>
                        <td class="py-4 px-6 font-mono text-slate-550 dark:text-slate-400">${m.context}</td>
                        <td class="py-4 px-6 text-slate-500 dark:text-slate-400 max-w-xs truncate" title="${m.notes}">${m.notes}</td>
                    </tr>
                `).join('');
            }

            // 2. 移动端卡片渲染
            const cardList = document.getElementById('card-list');
            if (filtered.length === 0) {
                cardList.innerHTML = `<div class="py-8 text-center text-slate-500 text-xs">未找到相关大模型价格信息</div>`;
            } else {
                cardList.innerHTML = filtered.map(m => `
                    <div class="rounded-xl border border-slate-200 bg-white dark:border-slate-850 dark:bg-slate-900/30 p-4 space-y-3 shadow-sm dark:shadow-none">
                        <div class="flex items-center justify-between">
                            <h3 class="font-bold text-sm text-slate-900 dark:text-white">${m.name}</h3>
                            <span class="rounded bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 px-2 py-0.5 text-[9px] text-slate-500 dark:text-slate-400 font-semibold">${m.provider}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-center text-[10px] bg-slate-50 dark:bg-slate-950/40 p-2.5 rounded-lg border border-slate-200 dark:border-slate-850/50">
                            <div>
                                <span class="block text-slate-400 dark:text-slate-500">输入价格 / 1M</span>
                                <span class="font-mono font-bold text-slate-800 dark:text-slate-200 mt-0.5 block">${formatPrice(m.inputUSD, 3)}</span>
                            </div>
                            <div>
                                <span class="block text-amber-600 dark:text-amber-500/80">缓存命中 / 1M</span>
                                <span class="font-mono font-bold text-amber-600 dark:text-amber-400 mt-0.5 block">${formatPrice(m.cachedInputUSD, 3)}</span>
                            </div>
                            <div>
                                <span class="block text-emerald-600 dark:text-emerald-500/80">输出价格 / 1M</span>
                                <span class="font-mono font-bold text-emerald-600 dark:text-emerald-400 mt-0.5 block">${formatPrice(m.outputUSD, 3)}</span>
                            </div>
                        </div>
                        <div class="text-[11px] text-slate-500 dark:text-slate-400 leading-relaxed pt-1">
                            备注: ${m.notes}
                        </div>
                        <div class="text-[10px] text-slate-400 dark:text-slate-500 font-mono">
                            上下文: ${m.context}
                        </div>
                    </div>
                `).join('');
            }
        }

        // 加载运行
        window.addEventListener('DOMContentLoaded', () => {
            initApp();
        });
    </script>
</body>
</html>
