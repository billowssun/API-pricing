name: 同步官方模型与未来雷达

on:
  schedule:
    - cron: '0 * * * *'   # 每小时同步已上架模型
    - cron: '17 */3 * * *' # 每 3 小时同步未来模型雷达
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 同步已上架模型
        run: node scraper.js
      - name: 同步未来模型雷达
        run: node future-scraper.js
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pricing.json future-models.json future-scraper.js
          git diff --staged --quiet || (git commit -m "🤖 自动同步模型数据 $(date +%Y-%m-%d)" && git push)
